# Belief Configuration
# One file controls the entire system. Change parameters here and the workflow adapts automatically.

belief_config:

  # ─── MODEL SELECTION ───────────────────────────────────────────────────────
  # Models used at each stage of the pipeline.
  # Setup prompts (00, 01, 03, 06) and the belief engine can use different models.
  # Use a capable reasoning model for belief evolution; a faster model for extraction.
  belief_reasoning_model: claude-opus-4-8        # belief engine (Step 7) and setup compilers (03, 06)
  fact_extraction_model: claude-sonnet-4-6       # fact extractor (Step 6)
  document_profile_model: claude-sonnet-4-6      # interview agent (Step 1, Prompt 00)
  transcription_model: claude-sonnet-4-6         # document intake and transcription (Step 5)

  # ─── TOKEN LIMITS ──────────────────────────────────────────────────────────
  # Documents above this limit are split into chunks for the fact extraction loop.
  # Documents below this limit run as a single extraction pass.
  token_limit_per_chunk: 50000

  # ─── ACTIVE BELIEF STREAMS ──────────────────────────────────────────────────
  # Standard belief streams available for stream setup.
  # Each stream selects one of these at setup time (Step 0).
  # Custom streams can be defined during the Prompt 00 interview.
  standard_streams:
    - factual_understanding       # 00 — Factual Understanding
    - business_model_understanding # 01 — Business Model Understanding
    - business_dynamics           # 02 — Business Dynamics
    - causal_understanding        # 03 — Causal Understanding
    - business_memory             # 04 — Business Memory
    - narrative_understanding     # 05 — Narrative Understanding
    - forecast_and_plan_behavior  # 06 — Forecast and Plan Behavior

  # ─── MATURITY LADDER ───────────────────────────────────────────────────────
  # Documents required to advance through the durability stages.
  # These are defaults; the Strategic Blueprint (Prompt 01) can override per stream
  # based on the document cadence for that entity (e.g., quarterly vs. monthly).
  maturity_thresholds:
    candidate_to_provisional: 2   # documents with supporting signal
    provisional_to_confirmed: 3
    confirmed_to_established: 4

  # ─── VERIFICATION GATING (Process Test) ────────────────────────────────────
  # A belief cannot advance a durability stage on confirmation alone — see
  # belief-doctrine.md "The Two-Test Gate." These flags control when the
  # extractor must run a second, blind pass (no visibility into the existing
  # belief) instead of the default belief-aware pass.
  require_blind_pass_for_promotion: true      # Candidate→Provisional, Provisional→Confirmed
  require_contradiction_search_for_confirmed: true   # must be reported, not just absent

  # ─── ESTABLISHED DECAY (document-count-based, distinct from day-based decay below) ──
  # An Established belief with no relevant signal across this many consecutive
  # comparable documents downgrades to Confirmed (tag: [DECAY]). This is a
  # Status change, separate from the Confidence-score decay settings below.
  established_decay_after_silent_documents: 4

  # ─── FOUNDATION CORPUS GROUNDING ────────────────────────────────────────────
  # After this many documents' fact logs exist, Prompt -1 runs its corpus
  # grounding pass: read all fact logs together, extract what recurred
  # identically (definitional claims -> source: corpus), corroborate or
  # challenge interview claims. Interview-only claims remain labeled
  # hypotheses until corroborated.
  foundation_grounding_min_documents: 3

  # ─── FOUNDATION REVIEW ──────────────────────────────────────────────────────
  # A belief reaching this status while bearing on a named foundation claim
  # triggers Foundation Review (lifecycle/ingestion-pipeline.md, Step 7.5).
  # A Candidate or Provisional belief never triggers this — see belief-doctrine.md.
  foundation_review_trigger_status: Confirmed   # Confirmed or Established

  # How the Adopt/Hold/Defer decision gets made. "user_confirm" surfaces the
  # conflict and waits for the analyst; "automatic" lets the engine Adopt
  # without confirmation whenever the triggering belief is Established.
  # Default is user_confirm — silent foundation edits are the failure mode
  # Grounded exists to prevent.
  foundation_review_resolution: user_confirm    # user_confirm | automatic

  # ─── DECAY SETTINGS (Confidence score, not Status) ─────────────────────────
  # Beliefs not confirmed within this many days begin losing confidence.
  decay_threshold_days: 90

  # Confidence reduction per decay cycle for unseen beliefs.
  decay_rate_per_cycle: 0.05

  # Beliefs below this threshold are archived (not deleted).
  archive_threshold: 0.10

  # ─── BELIEF MEMORY BOUNDS ────────────────────────────────────────────────────
  # Maximum number of active beliefs per stream.
  # Beliefs are ranked by confidence; lowest are archived first when this is exceeded.
  max_beliefs_per_stream: 20

  # Minimum active beliefs before the engine flags over-collapse and audits for umbrella beliefs.
  min_beliefs_volume_check: 8

  # Target range for the first document — number of specific Candidate beliefs to initialize.
  first_doc_target_min: 8
  first_doc_target_max: 15

  # ─── STORAGE PATHS ─────────────────────────────────────────────────────────
  # entities/ holds foundation.md for each entity — built once before any belief stream.
  # compiled/ holds one-time setup artifacts per stream (blueprint, compiled prompts).
  # streams/ holds the living belief memory, fact logs, and raw archive per stream.
  entities_path: ./entities/             # entities/{entity_id}/foundation.md
  compiled_path: ./compiled/             # compiled/{stream_id}/
  streams_path: ./streams/              # streams/{stream_id}/belief.md, L2_factlogs/, L3_raw/

  # ─── CONFIDENCE ARITHMETIC ─────────────────────────────────────────────────
  # Standard update values. Match the belief reasoning system prompts.
  # NOTE: Confidence is bookkeeping, not trust. Status (Candidate/Provisional/
  # Confirmed/Established) is earned through verification -- blind passes and
  # contradiction searches recorded in the Provenance record -- and governs how
  # a belief may be cited. Confidence tracks strengthening/staleness WITHIN a
  # status and drives archival. It can never promote a belief past the
  # verification its status requires.
  confirm_delta: +0.08
  contradict_delta: -0.15
  new_prior_confidence: 0.20
  confidence_cap: 0.95
  confidence_cap_causal: 0.90    # causal beliefs are probabilistic, not deterministic
  confidence_floor: 0.05
